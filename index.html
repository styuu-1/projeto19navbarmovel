<!DOCTYPE html>
<html lang="pt-br">

<head>


    <!-- Titulo -->
    <title>Navbar interativa</title>
    <!-- Titulo -->

    <!-- Meta arquivos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="card, blog pessoal, informação">
    <meta name="description" content="meu card pessoal feito especialmente para projeto, 01 projeto">
    <meta name="author" content="Samuel Pacheco Falcão Rodrigues">
    <meta name="robots" content="index, follow">
    <!-- Meta arquivos -->

    <!-- font cloudflare 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Link css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Link css -->
</head>

<body>

    <div class="container">
        <input type="radio" name="slider" id="home" checked>
        <input type="radio" name="slider" id="blog">
        <input type="radio" name="slider" id="code">
        <input type="radio" name="slider" id="help">
        <input type="radio" name="slider" id="about">
        <nav>
            <div class="slider"></div>
            <label for="home" class="home"><i class="fas fa-home"></i>Home</label>
            <label for="blog" class="blog"><i class="fas fa-blog"></i>Blog</label>
            <label for="code" class="code"><i class="fas fa-code"></i>Código</label>
            <label for="help" class="help"><i class="fas fa-envelope"></i>Ajuda</label>
            <label for="about" class="about"><i class="fas fa-user"></i>Sobre-Nós</label>
        </nav>
    </div>


















</body>

</html>
